<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BG</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        .video-wrapper {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 56.25vw;
            min-height: 100vh;
            min-width: 177.77vh;
            transform: translate(-50%, -50%);
            border: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="video-wrapper" id="wrapper"></div>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const videoId = (params.get('v') || '').replace(/[^a-zA-Z0-9_-]/g, '');
            if (!videoId) return;

            const src = 'https://www.youtube.com/embed/' + videoId
                + '?autoplay=1&mute=1&controls=0&loop=1&playlist=' + videoId
                + '&modestbranding=1&showinfo=0&rel=0&iv_load_policy=3'
                + '&disablekb=1&fs=0&playsinline=1';

            const iframe = document.createElement('iframe');
            iframe.src = src;
            iframe.setAttribute('allow', 'autoplay; encrypted-media');
            iframe.setAttribute('frameborder', '0');
            iframe.setAttribute('allowfullscreen', '');
            document.getElementById('wrapper').appendChild(iframe);
        })();
    </script>
</body>
</html>
