<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BG</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        .video-wrapper {
            position: fixed;
            inset: 0;
            overflow: hidden;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 56.25vw;
            min-height: 100vh;
            min-width: 177.77vh;
            transform: translate(-50%, -50%);
            border: 0;
            pointer-events: none;
        }
        .click-block {
            position: fixed;
            inset: 0;
            z-index: 10;
            background: transparent;
        }
    </style>
</head>
<body>
    <div class="video-wrapper" id="wrapper">
        <div id="player"></div>
    </div>
    <div class="click-block"></div>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const videoId = (params.get('v') || '').replace(/[^a-zA-Z0-9_-]/g, '');
            const wantSound = params.get('sound') !== '0';
            const quality = (params.get('q') || 'hd1080').replace(/[^a-zA-Z0-9]/g, '');
            if (!videoId) return;

            const tag = document.createElement('script');
            tag.src = 'https://www.youtube.com/iframe_api';
            document.head.appendChild(tag);

            let player;
            window.onYouTubeIframeAPIReady = function () {
                player = new YT.Player('player', {
                    videoId: videoId,
                    playerVars: {
                        autoplay: 1,
                        mute: 1,
                        controls: 0,
                        loop: 1,
                        playlist: videoId,
                        modestbranding: 1,
                        showinfo: 0,
                        rel: 0,
                        iv_load_policy: 3,
                        disablekb: 1,
                        fs: 0,
                        playsinline: 1
                    },
                    events: {
                        onReady: function (e) {
                            try { e.target.setPlaybackQuality(quality); } catch (err) {}
                            if (wantSound) {
                                setTimeout(function () {
                                    try {
                                        e.target.unMute();
                                        e.target.setVolume(100);
                                    } catch (err) {}
                                }, 800);
                            }
                            try { e.target.playVideo(); } catch (err) {}
                        },
                        onStateChange: function (e) {
                            if (e.data === YT.PlayerState.PLAYING) {
                                try { e.target.setPlaybackQuality(quality); } catch (err) {}
                            }
                            if (e.data === YT.PlayerState.ENDED) {
                                try { e.target.playVideo(); } catch (err) {}
                            }
                        }
                    }
                });
            };
        })();
    </script>
</body>
</html>
