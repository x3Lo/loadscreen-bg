<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BG</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        .video-wrapper {
            position: fixed;
            inset: 0;
            overflow: hidden;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        .video-wrapper.ready {
            visibility: visible;
            opacity: 1;
        }
        .video-wrapper iframe,
        .video-wrapper #player {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150vw;
            height: 84.375vw;
            min-height: 150vh;
            min-width: 266.66vh;
            transform: translate(-50%, -50%);
            border: 0;
            pointer-events: none;
        }
        .click-block {
            position: fixed;
            inset: 0;
            z-index: 10;
            background: transparent;
            pointer-events: auto;
        }
        .black-cover {
            position: fixed;
            inset: 0;
            z-index: 50;
            background: #000;
            pointer-events: none;
        }
        .black-cover.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="video-wrapper" id="wrapper">
        <div id="player"></div>
    </div>
    <div class="click-block"></div>
    <div class="black-cover" id="cover"></div>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const videoId = (params.get('v') || '').replace(/[^a-zA-Z0-9_-]/g, '');
            const wantSound = params.get('sound') !== '0';
            const quality = (params.get('q') || 'hd1080').replace(/[^a-zA-Z0-9]/g, '');
            if (!videoId) return;

            const tag = document.createElement('script');
            tag.src = 'https://www.youtube.com/iframe_api';
            document.head.appendChild(tag);

            let revealed = false;
            function reveal() {
                if (revealed) return;
                revealed = true;
                const wrapper = document.getElementById('wrapper');
                const cover = document.getElementById('cover');
                if (wrapper) wrapper.classList.add('ready');
                setTimeout(function () {
                    if (cover) cover.classList.add('hidden');
                }, 800);
            }

            window.onYouTubeIframeAPIReady = function () {
                new YT.Player('player', {
                    videoId: videoId,
                    playerVars: {
                        autoplay: 1,
                        mute: 1,
                        controls: 0,
                        loop: 1,
                        playlist: videoId,
                        modestbranding: 1,
                        showinfo: 0,
                        rel: 0,
                        iv_load_policy: 3,
                        disablekb: 1,
                        fs: 0,
                        playsinline: 1,
                        cc_load_policy: 0,
                        enablejsapi: 1
                    },
                    events: {
                        onReady: function (e) {
                            try { e.target.setPlaybackQuality(quality); } catch (err) {}
                            try { e.target.playVideo(); } catch (err) {}
                            if (wantSound) {
                                setTimeout(function () {
                                    try {
                                        e.target.unMute();
                                        e.target.setVolume(100);
                                    } catch (err) {}
                                }, 1500);
                            }
                        },
                        onStateChange: function (e) {
                            if (e.data === YT.PlayerState.PLAYING) {
                                try { e.target.setPlaybackQuality(quality); } catch (err) {}
                                reveal();
                            }
                            if (e.data === YT.PlayerState.ENDED) {
                                try { e.target.playVideo(); } catch (err) {}
                            }
                            if (e.data === YT.PlayerState.PAUSED) {
                                try { e.target.playVideo(); } catch (err) {}
                            }
                        }
                    }
                });
            };
        })();
    </script>
</body>
</html>
